<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>智慧校园AI向导 - 浙江树人学院</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            background: linear-gradient(135deg, #e8f0fe 0%, #d4c8f0 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* ===== 头部 ===== */
        header {
            text-align: center;
            padding: 20px 0 15px;
            color: #2c3e50;
        }

        header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #4a6cf7 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        header p {
            color: #555;
            margin-top: 6px;
            font-size: 0.9rem;
        }

        /* ===== 主布局 ===== */
        main {
            display: flex;
            gap: 24px;
            max-width: 1400px;
            margin: 16px auto;
            align-items: flex-start;
        }

        /* ===== 左侧聊天区 ===== */
        .chat-area {
            flex: 1.2;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            min-height: 520px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 8px 4px;
            max-height: 420px;
        }

        .chat-box .message {
            display: flex;
            align-items: flex-start;
            margin-bottom: 14px;
            animation: fadeIn 0.3s ease;
        }

        .chat-box .message.bot {
            flex-direction: row;
        }

        .chat-box .message.user {
            flex-direction: row-reverse;
        }

        .chat-box .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #4a6cf7;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            margin: 0 10px;
        }

        .chat-box .message.user .avatar {
            background: #f59e0b;
        }

        .chat-box .bubble {
            max-width: 72%;
            padding: 10px 16px;
            border-radius: 14px;
            background: #f1f3f5;
            color: #1a1a2e;
            line-height: 1.6;
            font-size: 0.93rem;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .chat-box .message.user .bubble {
            background: #4a6cf7;
            color: #fff;
        }

        .chat-box .message.bot .bubble {
            background: #f1f3f5;
            color: #1a1a2e;
        }

        /* ===== 输入区 ===== */
        .input-area {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 30px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        .input-area input:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.15);
        }

        .input-area button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #4a6cf7 0%, #7c3aed 100%);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 108, 247, 0.35);
        }

        /* ===== 右侧功能区 ===== */
        .function-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .function-area h2 {
            color: #1a1a2e;
            font-size: 1.2rem;
            padding-left: 4px;
        }

        .func-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 18px 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: 0.3s;
        }

        .func-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .func-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .func-card h3 {
            color: #1a1a2e;
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .func-card p {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .quick-btn {
            padding: 5px 14px;
            margin: 3px 5px 3px 0;
            background: #f1f3f5;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: 0.2s;
            color: #1a1a2e;
        }

        .quick-btn:hover {
            background: #4a6cf7;
            color: #fff;
            border-color: #4a6cf7;
        }

        .scene-buttons {
            display: flex;
            gap: 8px;
            margin: 6px 0 10px;
        }

        .scene-btn {
            padding: 6px 18px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            border: none;
            border-radius: 18px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }

        .scene-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.35);
        }

        /* ===== AIGC展示区 ===== */
        .aigc-display {
            margin-top: 8px;
            border-radius: 12px;
            overflow: hidden;
            background: #f8f9fa;
            text-align: center;
        }

        .aigc-display img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }

        .aigc-display p {
            padding: 8px 10px;
            font-size: 0.85rem;
            color: #555;
            line-height: 1.5;
        }

        /* ===== 底部 ===== */
        footer {
            text-align: center;
            padding: 20px 0 8px;
            color: #999;
            font-size: 0.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            margin-top: 16px;
        }

        footer a {
            color: #4a6cf7;
            text-decoration: none;
        }

        /* ===== 动画 ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 900px) {
            main {
                flex-direction: column;
            }
            .chat-area {
                min-height: 360px;
            }
            .chat-box {
                max-height: 260px;
            }
            .aigc-display img {
                height: 120px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 头部 ===== -->
    <header>
        <h1>🏫 智慧校园AI向导</h1>
        <p>浙江树人学院 · 数字媒体技术242 · 人工智能课程大作业(AI校园)</p>
    </header>

    <!-- ===== 主体 ===== -->
    <main>
        <!-- 左侧聊天 -->
        <section class="chat-area">
            <div class="chat-box" id="chatBox">
                <div class="message bot">
                    <span class="avatar">🤖</span>
                    <div class="bubble">你好！我是校园AI向导 <strong>小树</strong> 🌳<br/>请问有什么可以帮你的吗？?<br/>试试点击右侧的快捷按钮吧！!</div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="请输入你的问题...." />
                <button id="sendBtn">发送</button>
            </div>
        </section>

        <!-- 右侧功能 -->
        <aside class="function-area">
            <h2>✨ 三大核心功能</h2>

            <!-- 功能1 -->
            <div class="func-card">
                <div class="func-icon">❓</div>
                <h3>校园信息问答</h3>
                <p>问校园地点、时间、活动等</p>
                <button class="quick-btn" data-question="图书馆几点关门？">📚 图书馆时间查询</button>
                <button class="quick-btn" data-question="食堂有什么好吃的？推荐一下">🍜 食堂菜品推荐</button>
                <button class="quick-btn" data-question="体育馆什么时候开放？">🏟️ 体育馆开放时间</button>
            </div>

            <!-- 功能2 -->
            <div class="func-card">
                <div class="func-icon">✍️</div>
                <h3>校园文案生成</h3>
                <p>生成攻略、指南等内容</p>
                <button class="quick-btn" data-question="帮我写一份新生校园生存指南">📖 新生指南</button>
                <button class="quick-btn" data-question="写一段校园一日游攻略">🚶 一日游攻略</button>
                <button class="quick-btn" data-question="写一个社团招新宣传语">🎉 招新文案</button>
            </div>

            <!-- 功能3 -->
            <div class="func-card">
                <div class="func-icon">🗺️</div>
                <h3>AI校园导游</h3>
                <p>点击地点，AI介绍 + AIGC场景图</p>
                <div class="scene-buttons">
                    <button class="scene-btn" data-scene="图书馆">📚 图书馆位置</button>
                    <button class="scene-btn" data-scene="食堂">🍽️ 食堂位置</button>
                    <button class="scene-btn" data-scene="教学楼">🏛️ 教学楼位置</button>
                </div>
                <div class="aigc-display" id="aigcDisplay">
                    <img id="sceneImage" src="campus.jpg" alt="校园场景" />
                    <p id="sceneDesc">点击上方地点按钮，查看AI介绍与场景图</p>
                </div>
            </div>
        </aside>
    </main>

    <!-- ===== 底部 ===== -->
    <footer>
        <p>本项目是浙江树人学院《人工智能》课程大作业 · 使用扣子AI + AIGC生成资产</p>
        <p>GitHub: <a href="#" target="_blank">你的仓库地址</a></p>
    </footer>

    <!-- ========================================================= -->
    <!-- ===== JavaScript ===== -->
    <!-- ========================================================= -->
    <script>
        // ============================================================
        // 1. 配置区
        // ============================================================
        const CONFIG = {
            token: 'pat_ytkZBvseg1BcGZkYVGv2LoungHwcKVBdbtJsvlP0a3qkbNt07Qn3s39bc1PQIrwJ',
            botId: '7654488902581403684',
            apiUrl: 'https://api.coze.cn/v3/chat'
        };

        // ============================================================
        // 2. DOM 引用
        // ============================================================
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const sceneImage = document.getElementById('sceneImage');
        const sceneDesc = document.getElementById('sceneDesc');

        // ============================================================
        // 3. 本地备用回复（API调用失败时自动使用）
        // ============================================================
        const fallbackResponses = {
            '图书馆': '📚 图书馆开放时间：每天 8:00-22:00，位于中心广场北侧，共5层，有自习区和咖啡吧。',
            '食堂': '🍜 学校有3个食堂：一食堂（家常菜）、二食堂（小吃）、民族食堂。推荐一食堂的红烧肉和牛肉面！',
            '体育馆': '🏟️ 体育馆开放时间：工作日 9:00-21:00，周末 10:00-20:00。需携带校园卡。',
            '新生': '🎓 新生校园生存指南：\n1. 下载校园APP，绑定学号\n2. 加入班级群和学院群\n3. 熟悉校园地图\n4. 办理校园卡并充值\n5. 多参加社团活动',
            '攻略': '🚶 校园一日游攻略：\n上午 参观图书馆 → 中午 一食堂用餐 → 下午 体育馆运动 → 傍晚 校园湖边散步',
            '招新': '🎉 社团招新啦！\n无论你热爱什么，这里都有你的舞台！\n📍 招新时间：9月15日-20日，中心广场等你！'
        };

        function getFallbackReply(message) {
            for (const [key, value] of Object.entries(fallbackResponses)) {
                if (message.includes(key)) {
                    return value;
                }
            }
            return null;
        }

        // ============================================================
        // 4. 核心函数：调用扣子AI API
        // ============================================================
        async function callCozeAPI(userMessage) {
            try {
                console.log('📤 发送消息:', userMessage);

                const response = await fetch(CONFIG.apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.token}`
                    },
                    body: JSON.stringify({
                        bot_id: CONFIG.botId,
                        user_id: 'user_001',
                        stream: false,
                        auto_save_history: true,
                        additional_messages: [{
                            role: 'user',
                            content: userMessage,
                            content_type: 'text'
                        }]
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('❌ HTTP错误:', response.status, errorText);
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                console.log('✅ 扣子API返回:', data);

                // 解析回复
                let reply = data.choices?.[0]?.message?.content;
                if (!reply) reply = data.output;
                if (!reply) reply = data.content;
                if (!reply) reply = data.message;
                if (!reply && data.data) {
                    reply = data.data.reply || data.data.content || data.data.message;
                }

                return reply || null;

            } catch (error) {
                console.error('❌ API调用异常:', error);
                return null;
            }
        }

        // ============================================================
        // 5. 发送消息
        // ============================================================
        async function sendMessage(message) {
            if (!message || !message.trim()) return;

            // 显示用户消息
            addMessage(message, 'user');
            userInput.value = '';

            // 显示加载
            const loadingId = showLoading();

            // 调用API
            const reply = await callCozeAPI(message);

            // 移除加载
            hideLoading(loadingId);

            // 显示回复
            if (reply) {
                addMessage(reply, 'bot');
            } else {
                // 尝试本地备用
                const fallback = getFallbackReply(message);
                if (fallback) {
                    addMessage('📌 本地模式：\n\n' + fallback, 'bot');
                } else {
                    addMessage('😅 网络开小差了，请稍后再试。\n\n试试问：\n• 图书馆几点关门？\n• 食堂有什么好吃的？\n• 帮我写一份新生指南', 'bot');
                }
            }
        }

        // ============================================================
        // 6. UI辅助
        // ============================================================
        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender === 'bot' ? 'bot' : 'user'}`;
            const avatar = sender === 'bot' ? '🤖' : '👤';
            div.innerHTML = `
                <span class="avatar">${avatar}</span>
                <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showLoading() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.className = 'message bot';
            div.id = id;
            div.innerHTML = `
                <span class="avatar">🤖</span>
                <div class="bubble">⏳ 正在思考...</div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function hideLoading(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }
        
        // ============================================================
        // 7. 场景导游
        // ============================================================
        const sceneData = {
            '图书馆': {
                img: 'library.jpg',
                desc: '📚 图书馆是校园的知识中心，共5层，藏书百万册。一至二层设有自习室，配备充电插座与静音阅览座位。三层设有自助借阅区与新书展示台。四层电子阅览室提供海量知网、万方外文数据库访问权限。五层休闲咖啡吧可短暂放松休憩。馆内24小时自主还书机、线上预约座位系统全覆盖，是日常自习、查阅文献、小组研讨的首选场地。'
            },
            '食堂': {
                img: 'canteen.jpg',
                desc: '🍽️ 校园食堂提供丰富多样的美食，从传统中餐到西式简餐，兼顾南北风味。满足师生不同时段就餐需求。'
            },
            '教学楼': {
                img: 'campus.jpg',
                desc: '🏛️ 教学楼A区是主要教学场所，配备智慧教室和多媒体设备。B区教室容量大，同时配备多功能设备。'
            }
        };

        async function handleScene(sceneName) {
            const data = sceneData[sceneName];
            if (!data) return;

            sceneImage.src = data.img;
            sceneImage.alt = sceneName;
            sceneDesc.textContent = `⏳ AI正在介绍 ${sceneName}...`;

            const reply = await callCozeAPI(`请详细介绍浙江树人学院的${sceneName}，包括位置、特色，用活泼亲切的语气。`);

            if (reply) {
                sceneDesc.textContent = reply;
            } else {
                sceneDesc.textContent = data.desc + '\n（AI联网失败，显示预设信息）';
            }
        }

        // ============================================================
        // 8. 事件绑定
        // ============================================================
        sendBtn.addEventListener('click', () => sendMessage(userInput.value));
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage(userInput.value);
            }
        });

        document.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const q = btn.dataset.question;
                userInput.value = q;
                sendMessage(q);
            });
        });

        document.querySelectorAll('.scene-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                handleScene(btn.dataset.scene);
            });
        });

        console.log('🏫 智慧校园AI向导已启动！');
        console.log('📌 Bot ID:', CONFIG.botId);
        console.log('📌 Token:', CONFIG.token ? '已配置 ✅' : '❌ 未配置');
    </script>

</body>
</html>
